name: freezed_factories_example
publish_to: none
description: Example on how to use freezed_factories
version: 1.0.0

environment:
  sdk: ">=3.10.3 <4.0.0"

dependencies:
  freezed_factories:
    path: ../
  freezed_factories_annotation:
    path: ../../freezed_factories_annotation
  freezed_annotation: ^3.1.0
  faker: ^2.2.0

dev_dependencies:
  build_runner: ^2.10.4
  freezed: ^3.2.3
  lints: ^6.0.0
  test: ^1.28.0

dependency_overrides:
  freezed_factories:
    path: ../
  freezed_factories_annotation:
    path: ../../freezed_factories_annotation
